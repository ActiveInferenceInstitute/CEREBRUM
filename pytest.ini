[pytest]
testpaths = 
    tests
    beyond_cerebrum/src/tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# tests/pomdp/test_cases: requires unimplemented POMDP backend (tracked: no timeline)
# tests/models/test_linear_regression.py: covered by test_linear_regression_comprehensive.py
# tests/models/linear_regression_cases: requires unimplemented case-specific regression backend
addopts = --strict-markers -v --ignore=tests/pomdp/test_cases --ignore=tests/models/test_linear_regression.py --ignore=tests/models/linear_regression_cases
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    slow: marks tests as slow tests
    model: Tests for model classes
    transformation: Tests for transformations
    visualization: Tests for visualization components
    end_to_end: End-to-end tests
    regression: Tests related to regression models
    order: Marker for controlling test execution order (pytest-order)
    live: marks tests that require live API connections (opt-in)
filterwarnings =
    ignore::DeprecationWarning
    ignore::ImportWarning
xfail_strict = true
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_file = tests/pytest_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_file_mode = w
log_file_date_format=%Y-%m-%d %H:%M:%S
junit_family=xunit2 